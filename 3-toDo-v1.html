<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #0f172a, #1e293b);
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .app {
            width: 100%;
            max-width: 600px;
            background: rgba(31, 41, 55, 0.95);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        .app-header {
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .todo-form {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .todo-form input {
            flex: 1;
            padding: 0.9rem 1rem;
            border: 1px solid #334155;
            border-radius: 12px;
            background: #0f172a;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
        }

        .todo-form input:focus {
            border-color: #2dd4bf;
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15);
        }

        .todo-form button {
            border: none;
            border-radius: 12px;
            padding: 0.9rem 1.1rem;
            background: #2dd4bf;
            color: #0f172a;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .todo-form button:hover {
            transform: translateY(-1px);
            opacity: .95;
        }

        .todo-section h2 {
            font-size: 1rem;
            margin-bottom: .75rem;
            color: #cbd5e1;
        }

        #taskList {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: .75rem;
        }

        #taskList li {
            background: #111827;
            border: 1px solid #263244;
            border-radius: 12px;
            padding: 0.9rem 1rem;
            color: #f8fafc;
        }

        .sr-only {
            position: absolute;
            left: -9999px;
        }

        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .todo-item span {
            flex: 1;
            line-height: 1.4;
            word-break: break-word;
        }

        .todo-item button {
            border: none;
            border-radius: 10px;
            padding: .45rem .7rem;
            background: #7f1d1d;
            color: #fecaca;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .todo-item button:hover {
            background: #991b1b;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <main class="app">
        <header>
            <h1 class="app-header">To Do App</h1>
            <p class="subtitle">Turn your honey-do's into honey-done's</p>
        </header>

        <form id="todoForm" class="todo-form">
            <label for="todoInput" class="sr-only">New Task:</label>
            <input type="text" name="todoInput" id="todoInput" placeholder="what else needs doing...?">
            <button type="submit" id="addTodoBtn">Add Task</button>
        </form>
        <section class="todo-section">
            <h2>Task List</h2>
            <ul id="taskList">
            </ul>
        </section>
    </main>
    <script>
        // console.log("we're ready to list some to-dos.")

        let todos = []
        const taskList = document.querySelector("#taskList");
        const todoInput = document.querySelector("#todoInput");
        const todoForm = document.querySelector("#todoForm");

        todoForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const userInput = todoInput.value;

            if (userInput.trim() !== "") {
                todos.push(userInput);
                // console.log("Updated todos Array: ", todos);
                render()
                todoForm.reset()
            }
        })


        function render() {
            taskList.innerHTML = "";
            todos.forEach(task => {
                let li = document.createElement("li");
                let row = document.createElement("div");
                let text = document.createElement("span");
                let deleteBtn = document.createElement("button");

                row.className = "todo-item";
                text.textContent = task;
                deleteBtn.textContent = "X";

                row.appendChild(text);
                row.appendChild(deleteBtn);
                li.appendChild(row);
                taskList.appendChild(li);


                deleteBtn.addEventListener("click", () => {
                    // console.log("delete that thang: ", task);
                    // console.log(todos.indexOf(task));
                    const taskIndex = todos.indexOf(task);
                    todos.splice(taskIndex, 1)
                    // console.log("Deleted? ", todos);
                    render();
                })
            });
        }


        render();

    </script>

</body>

</html>
