<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter v2</title>
    <style>
        :root {
            --bg: #0b0f14;
            --card: #121821;
            --text: #f5f7fa;
            --accent: #4cc9f0;
            --border: #2b3645;
            --muted: #a9b4c2;
            --surface: #1a2330;
            --accent-hover: #72dbf7;
            --danger: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-width: 100vh;
            background-color: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        .app {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin-bottom: 8px;
            font-size: 2rem;
            text-align: center;
        }

        .subtitle {
            color: var(--muted);
            text-align: center;
            margin-bottom: 24px;
        }

        .display {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
        }

        .btn:hover {
            transform: translateY(-1.5px)
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--accent);
            color: #071018;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: #253041;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #2d3a4f;
        }

        .btn-reset {
            width: 100%;
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-reset:hover {
            background: rgba(255, 107, 107, 0.08)
        }
    </style>
</head>

<body>
    <main class="app">
        <section class="card">
            <h1>Counter v2</h1>
            <p class="subtitle">State & render practice</p>
            <div class="display" id="countDisplay">0</div>

            <div class="controls">
                <button class="btn btn-secondary" id="decreaseBtn">Subtract</button>
                <button class="btn btn-primary" id="increaseBtn">Add</button>
            </div>

            <button class="btn btn-reset" id="resetBtn">Reset</button>

        </section>
    </main>

    <script>
        console.log("Hello Counters, let's count.")

        let count = 0;
        const decreaseBtn = document.querySelector("#decreaseBtn");
        const increaseBtn = document.querySelector("#increaseBtn");
        const countDisplay = document.querySelector("#countDisplay");
        const resetBtn = document.querySelector("#resetBtn");

        function render() {
            countDisplay.textContent = count;
            console.log(count);
        }

        decreaseBtn.addEventListener("click", () => {
            if (count > 0) {
                count--;
                render();
            }
        })

        increaseBtn.addEventListener("click", () => {
            count++;
            render()
        })

        resetBtn.addEventListener("click", () => {
            count = 0;
            render();
        })

        render();
    </script>

</body>

</html>
