<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter v2.2</title>
    <style>
        :root {
            --bg: #0b0f14;
            --card: #121821;
            --text: #f5f7fa;
            --accent: #4cc9f0;
            --border: #2b3645;
            --muted: #a9b4c2;
            --surface: #1a2330;
            --accent-hover: #72dbf7;
            --danger: #ff6b6b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        main {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin-bottom: 8px;
            font-size: 2rem;
            text-align: center;
        }

        .subtitle {
            color: var(--muted);
            text-align: center;
            margin-bottom: 24px;
        }

        .countDisplay {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 20px;
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
        }

        button:hover {
            transform: translateY(-1.5px);
        }

        button:active {
            transform: translateY(0);
        }

        .resetBtn {
            width: 100%;
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .resetBtn:hover {
            background: rgba(225, 107, 107, 0.8);
        }
    </style>
</head>

<body>
    <main>
        <section class="card">
            <h1>Counter v2.2</h1>
            <p class="subtitle">More practice</p>

            <div class="countDisplay">0</div>
            <section class="controls">
                <button class="subBtn">Subtract</button>
                <button class="addBtn">Add</button>
            </section>
            <section>
                <button class="resetBtn">Reset</button>
            </section>
        </section>
    </main>

    <script>
        let count = 0;
        const subBtn = document.querySelector(".subBtn");
        const countDisplay = document.querySelector(".countDisplay");
        const addBtn = document.querySelector(".addBtn");
        const resetBtn = document.querySelector(".resetBtn")

        subBtn.addEventListener("click", () => {
            count--;
            render();
        });

        addBtn.addEventListener("click", () => {
            count++;
            render();
        })

        resetBtn.addEventListener("click", () => {
            count = 0;
            render();
        })

        function render() {
            countDisplay.textContent = count;
            // console.log(count)
        }

        render();
    </script>
</body>

</html>
