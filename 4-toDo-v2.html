<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <style>
        :root {
            --bg: #0b0f14;
            --card: #121821;
            --surface: #1a2330;
            --text: #f5f7fa;
            --muted: #a9b4c2;
            --border: #2b3645;
            --accent: #4cc9f0;
            --accent-hover: #72dbf7;
            --danger: #ff6b6b;

            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;

            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.35);

            --space-1: 0.5rem;
            --space-2: 0.75rem;
            --space-3: 1rem;
            --space-4: 1.5rem;
            --space-5: 2rem;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, var(--bg), #111827);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--space-5);
        }

        button,
        input {
            font: inherit;
        }

        .app {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            box-shadow: var(--shadow-lg);
        }

        header {
            margin-bottom: var(--space-4);
        }

        .app-header {
            margin-bottom: var(--space-1);
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .todo-form {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-4);
        }

        .todo-form input {
            flex: 1;
            padding: 0.9rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface);
            color: var(--text);
            outline: none;
        }

        .todo-form input::placeholder {
            color: var(--muted);
        }

        .todo-form input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15);
        }

        .todo-form button {
            border: none;
            border-radius: var(--radius-md);
            padding: 0.9rem 1.1rem;
            background: var(--accent);
            color: var(--bg);
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .todo-form button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .task-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-2);
            flex-wrap: wrap;
        }

        .todo-section h2 {
            font-size: 1rem;
            /* margin-bottom: var(--space-2); */
            color: var(--muted);
        }

        .filters {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }

        .filter-btn {
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0.45rem 0.8rem;
            background: var(--surface);
            color: var(--muted);
            cursor: pointer;
            transition: 0.15s ease;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .filter-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
            font-weight: 700;
        }

        #taskList {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        #taskList li {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.9rem 1rem;
        }

        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-3);
        }

        .todo-item span {
            flex: 1;
            line-height: 1.4;
            word-break: break-word;
        }

        .todo-item .delete-btn {
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            padding: .45rem .7rem;
            background: rgba(255, 107, 107, 0.12);
            color: var(--danger);
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
        }

        .todo-item .complete-btn {
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            padding: .45rem .7rem;
            background: rgba(107, 255, 107, 0.12);
            color: var(--accent);
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
        }

        .todo-item .delete-btn:hover {
            background: rgba(255, 107, 107, 0.2);
            border-color: rgba(255, 107, 107, 0.35);
            transform: translateY(-1px);
        }

        .todo-item .complete-btn:hover {
            background: rgba(107, 255, 107, 0.2);
            border-color: rgba(107, 255, 107, 0.35);
            transform: translateY(-1px);
        }

        .completed {
            font-style: italic;
            text-decoration: line-through;
            color: var(--muted);
        }

        .empty-state {
            color: var(--muted);
            text-align: center;
            padding: 1rem;
            border: 1px dashed var(--border);
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.02);
        }

        .sr-only {
            position: absolute;
            left: -9999px;
        }

        @media (max-width: 600px) {
            body {
                padding: var(--space-3);
            }

            .app {
                padding: var(--space-4);
            }

            .todo-form {
                flex-direction: column;
            }

            .todo-form button {
                width: 100%;
            }

            .todo-item {
                align-items: flex-start;
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <header>
            <h1 class="app-header">To Do App</h1>
            <p class="subtitle">Turn your honey-do's into honey-done's</p>
        </header>

        <form id="todoForm" class="todo-form">
            <label for="todoInput" class="sr-only">New Task</label> 
            <input type="text" name="todoInput" id="todoInput"
                placeholder="what else needs doing...?">
            <button type="submit" id="addTodoBtn">Add Task</button>
        </form>

        <section class="todo-section">
            <div class="task-list-header">
                <h2>Task List</h2>
                <div class="filters">
                    <button type="button" class="filter-btn active" id="filter-all">All</button>
                    <button type="button" class="filter-btn" id="filter-active">Active</button>
                    <button type="button" class="filter-btn" id="filter-completed">Completed</button>
                </div>
            </div>

            <ul id="taskList">
            </ul>
        </section>
    </main>

    <script>
        let todos = []
        let currentFilter = "all"

        const taskList = document.querySelector("#taskList");
        const todoInput = document.querySelector("#todoInput");
        const todoForm = document.querySelector("#todoForm");
        const allFilter = document.querySelector("#filter-all");
        const activeFilter = document.querySelector("#filter-active");
        const completedFilter = document.querySelector("#filter-completed")
        const filterButtons = document.querySelectorAll(".filter-btn");

        function createTodo(text) {
            return {
                id: crypto.randomUUID(),
                text: text,
                completed: false,
            };
        }

        function getVisibleTodos() {
            if (currentFilter === "active") {
                return todos.filter(task => !task.completed);
            } else if (currentFilter === "completed") {
                return todos.filter(task => task.completed);
            } else {
                return todos;
            }
            console.log(currentFilter)
        }

        function updateActiveFilter() {
            filterButtons.forEach(button => button.classList.remove("active"));

            if (currentFilter === "all") {
                allFilter.classList.add("active");
            } else if (currentFilter === "active") {
                activeFilter.classList.add("active");
            } else {
                completedFilter.classList.add("active");
            }
        }

        function toggleTodo(id) {
            todos = todos.map(task => {
                if (task.id === id) {
                    return { ...task, completed: !task.completed };
                }
                return task;
            });
        }

        function deleteTodo(id) {
            todos = todos.filter(task => task.id !== id);
        }

        function render() {
            taskList.innerHTML = "";
            updateActiveFilter();

            const visibleTodos = getVisibleTodos();

            if (visibleTodos.length === 0) {
                const emptyMessage = document.createElement("li");
                emptyMessage.className = "empty-state";

                if (todos.length === 0) {
                    emptyMessage.textContent = "No tasks yet, add one above.";
                } else if (currentFilter === "active") {
                    emptyMessage.textContent = "No active tasks, time to relax.";
                } else if (currentFilter === "completed") {
                    emptyMessage.textContent = "No completed tasks. Get to work.";
                }

                taskList.appendChild(emptyMessage);
                return;
            }

            visibleTodos.forEach(task => {
                const li = document.createElement("li");
                const row = document.createElement("div");
                const text = document.createElement("span");
                const completeBtn = document.createElement("button");
                const deleteBtn = document.createElement("button");

                row.className = "todo-item";
                text.textContent = task.text;

                if (task.completed) {
                    text.classList.add("completed");
                }

                completeBtn.textContent = task.completed ? "Undo" : "Complete";
                completeBtn.className = "complete-btn";
                completeBtn.type = "button";

                deleteBtn.textContent = "Remove";
                deleteBtn.className = "delete-btn";
                deleteBtn.type = "button";

                completeBtn.addEventListener("click", () => {
                    toggleTodo(task.id);
                    render();
                });

                deleteBtn.addEventListener("click", () => {
                    deleteTodo(task.id);
                    render();
                })

                row.appendChild(text);
                row.appendChild(completeBtn);
                row.appendChild(deleteBtn);
                li.appendChild(row);
                taskList.appendChild(li);
            });
        }


        todoForm.addEventListener("submit", (e) => {
            e.preventDefault();

            const userInput = todoInput.value.trim();
            if (userInput === "") return;

            todos.push(createTodo(userInput));
            todoForm.reset();
            render();
        })



        allFilter.addEventListener("click", () => {
            currentFilter = "all";
            render();
        });

        activeFilter.addEventListener("click", () => {
            currentFilter = "active";
            render();
        });

        completedFilter.addEventListener("click", () => {
            currentFilter = "completed";
            render();
        });

        render();

    </script>

</body>

</html>
