<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter v3</title>
    <style>
        :root {
            --bg: #0b0f14;
            --card: #121821;
            --text: #f5f7fa;
            --accent: #4cc9f0;
            --border: #2b3645;
            --muted: #a9b4c2;
            --surface: #1a2330;
            --accent-hover: #72dbf7;
            --danger: #ff6b6b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        main {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin-bottom: 8px;
            font-size: 2rem;
            text-align: center;
        }

        .subtitle {
            color: var(--muted);
            text-align: center;
            margin-bottom: 24px;
        }

        .count-display {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        /* button {
            border: none;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
        } */

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
            transform: scale(0.97);
            opacity: 0.85;
        }

        button:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #071018;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: #253041;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #2d3a4f;
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background: rgba(255, 107, 107, 0.12);
        }

        .reset-btn {
            width: 100%;
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .reset-btn:hover {
            background: rgba(225, 107, 107, 0.12);
        }
    </style>
</head>

<body>
    <main>
        <section class="card">
            <h1>Counter v3</h1>
            <p class="subtitle">Small polishes</p>

            <div class="count-display">0</div>
            <section class="controls">
                <button class="btn btn-secondary sub-btn">Subtract</button>
                <button class="btn btn-primary add-btn">Add</button>
            </section>
            <section>
                <button class="btn btn-danger reset-btn">Reset</button>
            </section>
        </section>
    </main>

    <script>
        let count = 0;
        const subBtn = document.querySelector(".sub-btn");
        const countDisplay = document.querySelector(".count-display");
        const addBtn = document.querySelector(".add-btn");
        const resetBtn = document.querySelector(".reset-btn")

        function increment() {
            count++;
            render();
        }

        function decrement() {
            count--;
            render();
        }

        function reset() {
            count = 0;
            render();
        }

        subBtn.addEventListener("click", decrement);

        addBtn.addEventListener("click", increment);

        resetBtn.addEventListener("click", reset);

        function render() {
            countDisplay.textContent = count;

            if (count === 0) {
                subBtn.disabled = true;
                subBtn.style.opacity = "0.5";
                subBtn.style.cursor = "not-allowed";
            } else {
                subBtn.disabled = false;
                subBtn.style.opacity = "1";
                subBtn.style.cursor = "pointer";
            }
            // console.log(count)
        }

        render();
    </script>
</body>

</html>
